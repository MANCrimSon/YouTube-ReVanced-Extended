enable-magisk-update = true   # set this to false if you do not want to receive updates for the module in magisk app
parallel-jobs = 1

cli-source = "MorpheApp/morphe-cli"
cli-version = "latest"

[YouTube-Extended]
app-name = "YouTube"
rv-brand = "ReVanced Extended"
build-mode = "both"
# version = "20.31.42"
patches-source = "anddea/revanced-patches"
patches-version = "dev"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.youtube"
# archive-dlurl = "https://archive.org/download/crimsonman/apk/com.google.android.youtube"
excluded-patches = "'Custom header for YouTube'"
included-patches = "'Visual preferences icons for YouTube' 'Return YouTube Username'"
patcher-args = "-e Theme -OdarkThemeBackgroundColor=#FF121212 -OlightThemeBackgroundColor=#FFF9F9F9 -e 'Custom branding icon for YouTube' -OappIcon=revancify_red -e 'Custom branding name for YouTube' -OappName='RVX YouTube'"

[YouTube-Music-Extended]
app-name = "YouTube Music"
rv-brand = "ReVanced Extended"
build-mode = "both"
arch = "both"
# version = "8.30.54"
patches-source = "anddea/revanced-patches"
patches-version = "dev"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.apps.youtube.music"
# archive-dlurl = "https://archive.org/download/crimsonman/apk/com.google.android.apps.youtube.music"
excluded-patches = "'Custom header for YouTube Music'"
included-patches = "'Visual preferences icons for YouTube Music' 'Return YouTube Username'"
patcher-args = "-e 'Custom branding icon for YouTube Music' -OappIcon=revancify_red -e 'Custom branding name for YouTube Music' -OappName='RVX YT Music'"

[YouTube-Morphe]
app-name = "YouTube"
rv-brand = "Morphe"
build-mode = "both"
# version = "20.21.37"
patches-source = "MorpheApp/morphe-patches"
patches-version = "dev"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.youtube"
# archive-dlurl = "https://archive.org/download/crimsonman/apk/com.google.android.youtube"
excluded-patches = "'Custom header for YouTube'"
patcher-args = "-e 'Custom branding name for YouTube' -OappName='Morphe YouTube' -e Theme -OdarkThemeBackgroundColor=#002905 -OlightThemeBackgroundColor=#CCFFCC"

[YouTube-Music-Morphe]
app-name = "YouTube Music"
rv-brand = "Morphe"
build-mode = "both"
arch = "both"
# version = "8.30.54"
patches-source = "MorpheApp/morphe-patches"
patches-version = "dev"
apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.google.android.apps.youtube.music"
# archive-dlurl = "https://archive.org/download/crimsonman/apk/com.google.android.apps.youtube.music"
excluded-patches = "'Custom header for YouTube Music'"
patcher-args = "-e 'Custom branding name for YouTube Music' -OappName='Morphe YT Music' -e Theme -OdarkThemeBackgroundColor=#002905 -OlightThemeBackgroundColor=#CCFFCC"

